# Reverse proxy for Комунальний Дворецький (bot listens on 127.0.0.1:8100).
# TLS: after this is in place, run
#   sudo certbot --nginx -d dvoretskyi.duckdns.org
# certbot rewrites this block to add the 443 listener + cert paths and an 80->443 redirect.
server {
    listen 80;
    listen [::]:80;
    server_name dvoretskyi.duckdns.org;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
